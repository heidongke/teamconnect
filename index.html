<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TeamConnect - 团队沟通</title>
<style>
/* ===== RESET ===== */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  background: #1a1a2e;
  display: flex; justify-content: center; align-items: center;
  min-height: 100vh; overflow: hidden;
  user-select: none;
  -webkit-user-select: none;
}

/* ===== DESIGN TOKENS ===== */
:root {
  --bg: #F5F3FF;
  --primary: #6366F1;
  --primary-hover: #4F46E5;
  --primary-light: #EEF2FF;
  --title: #312E81;
  --body: #64748B;
  --meta: #A0AEC0;
  --meta-alt: #94A3B8;
  --card: #FFFFFF;
  --border: #E0E7FF;
  --red-bg: #FEF2F2;
  --red: #DC2626;
  --red-hover: #B91C1C;
  --green-bg: #F0FDF4;
  --green: #059669;
  --orange-bg: #FFF7ED;
  --orange: #EA580C;
}

/* ===== SCALE CONTAINER ===== */
.scale-container {
  position: relative;
  width: 390px; height: 844px;
  transform-origin: top left;
  overflow: hidden;
  border-radius: 24px;
  box-shadow: 0 0 0 2px rgba(99,102,241,0.05), 0 20px 60px rgba(0,0,0,0.3);
}

/* ===== SCREENS WRAPPER ===== */
.screens-wrapper {
  position: relative;
  width: 390px; height: 844px;
  overflow: hidden;
}

/* ===== SINGLE SCREEN ===== */
.screen {
  position: absolute; top: 0; left: 0;
  width: 390px; height: 844px;
  background: var(--bg);
  display: flex; flex-direction: column;
  opacity: 0; pointer-events: none;
  transition: opacity 0.35s ease;
}
.screen.active { opacity: 1; pointer-events: auto; }

/* ===== STATUS BAR ===== */
.status-bar {
  width: 390px; height: 62px;
  display: flex; justify-content: center; align-items: center;
  flex-shrink: 0;
}
.status-bar .time { font-size: 15px; font-weight: 700; color: var(--title); line-height: 18px; }

/* ===== CONTENT ===== */
.content-wrapper {
  flex: 1; width: 390px;
  display: flex; flex-direction: column;
  padding: 16px; gap: 24px;
  overflow-y: auto; overflow-x: hidden;
  -webkit-overflow-scrolling: touch;
  scrollbar-width: none;
}
.content-wrapper::-webkit-scrollbar { display: none; }

/* ===== HEADER ===== */
.page-header {
  display: flex; justify-content: space-between; align-items: center;
  width: 358px; flex-shrink: 0;
}
.page-title { font-size: 26px; font-weight: 700; color: var(--title); line-height: 31px; }
.header-btn {
  display: flex; align-items: center; gap: 4px;
  padding: 8px 14px; border-radius: 20px;
  font-size: 12px; font-weight: 600;
  background: var(--primary); color: #fff;
  border: none; cursor: pointer;
  font-family: inherit;
  transition: background 0.15s;
}
.header-btn:hover { background: var(--primary-hover); }
.header-btn svg { width: 14px; height: 14px; }

/* ===== STATS ROW ===== */
.stats-row {
  display: flex; gap: 10px;
  width: 358px; flex-shrink: 0;
}
.stat-card {
  flex: 1; display: flex; flex-direction: column;
  align-items: center; gap: 4px;
  background: var(--card); padding: 14px;
}
.stat-value { font-size: 28px; font-weight: 700; line-height: 34px; text-align: center; }
.stat-value.primary { color: var(--primary); }
.stat-value.green { color: var(--green); }
.stat-label { font-size: 11px; font-weight: 500; color: var(--meta-alt); text-align: center; line-height: 13px; }

/* ===== SECTION TITLE ===== */
.section-header {
  display: flex; justify-content: space-between; align-items: center;
  width: 358px; flex-shrink: 0;
}
.section-title {
  font-size: 15px; font-weight: 600; color: var(--title); line-height: 22px;
}
.section-add {
  font-size: 11px; font-weight: 600; color: var(--primary);
  border: none; background: none; cursor: pointer;
  font-family: inherit;
  padding: 2px 8px;
}

/* ===== CARDS ===== */
.card {
  background: var(--card); padding: 16px; gap: 10px;
  display: flex; flex-direction: column;
  width: 358px; flex-shrink: 0;
  position: relative;
}
.card .badge {
  display: inline-flex; align-items: center;
  padding: 4px 8px; height: 21px;
  border-radius: 0;
  font-size: 11px; font-weight: 600; line-height: 13px;
}
.card .badge.red { background: var(--red-bg); color: var(--red); }
.card .badge.blue { background: var(--primary-light); color: var(--primary); }
.card .badge.green { background: var(--green-bg); color: var(--green); }
.card .badge.orange { background: var(--orange-bg); color: var(--orange); }
.card .card-header { display: flex; justify-content: space-between; align-items: center; width: 326px; }
.card .card-title {
  font-size: 16px; font-weight: 700; color: var(--title); line-height: 24px;
  flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
}
.card .card-title.wrap { white-space: normal; }
.card .card-desc { font-size: 14px; font-weight: 400; color: var(--body); line-height: 22px; width: 326px; }
.card .card-footer { display: flex; justify-content: space-between; align-items: center; width: 326px; }
.card .card-meta { font-size: 11px; font-weight: 400; color: var(--meta); line-height: 13px; }
.card-actions {
  position: absolute; top: 12px; right: 12px;
  display: flex; gap: 4px; opacity: 0; transition: opacity 0.2s;
}
.card:hover .card-actions { opacity: 1; }
.card-action-btn {
  width: 28px; height: 28px; border-radius: 6px;
  border: 1px solid #E2E8F0; background: #fff;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; transition: all 0.15s;
}
.card-action-btn:hover { background: var(--primary-light); border-color: var(--primary); }
.card-action-btn.danger:hover { background: var(--red-bg); border-color: var(--red); }
.card-action-btn svg { width: 13px; height: 13px; }

/* ===== FILTER TABS ===== */
.filter-tabs { display: flex; gap: 8px; width: 358px; flex-shrink: 0; }
.filter-tab {
  flex: 1; display: flex; justify-content: center; align-items: center;
  padding: 10px 20px; font-size: 14px; font-weight: 500;
  line-height: 17px; cursor: pointer; transition: all 0.2s;
  border: none; outline: none; color: var(--body); background: var(--card);
  font-family: inherit;
}
.filter-tab.active { color: #FFFFFF; background: var(--primary); }

/* ===== TAB BAR ===== */
.tab-bar-container {
  width: 390px; height: 98px;
  display: flex; justify-content: center; align-items: center;
  padding: 12px 21px 21px 21px; flex-shrink: 0;
}
.tab-pill {
  width: 348px; height: 62px;
  display: flex; gap: 4px; padding: 4px;
  border-radius: 36px; background: var(--card);
  border: 1px solid var(--border);
}
.tab-item {
  flex: 1; display: flex; flex-direction: column;
  align-items: center; justify-content: center; gap: 4px;
  border-radius: 26px; cursor: pointer;
  transition: background 0.2s, color 0.2s;
  border: none; outline: none; background: transparent;
  font-family: inherit; color: var(--body);
}
.tab-item.active { background: var(--primary); color: #FFFFFF; }
.tab-item svg { width: 18px; height: 18px; }
.tab-item .tab-label {
  font-size: 10px; font-weight: 600; line-height: 12px; text-align: center;
}
.tab-item:not(.active) .tab-label { color: var(--body); }
.tab-item.active .tab-label { color: #FFFFFF; }

/* ===== INFO ROW ===== */
.info-row {
  display: flex; justify-content: space-between; align-items: center;
  width: 326px;
}

/* ===== PROFILE ===== */
.profile-card {
  background: var(--card); padding: 24px; gap: 16px;
  display: flex; flex-direction: column; align-items: center;
  width: 358px; flex-shrink: 0;
}
.avatar-row { display: flex; gap: 16px; align-items: center; width: 310px; }
.avatar-circle {
  width: 64px; height: 64px; border-radius: 50%;
  background: var(--primary);
  display: flex; justify-content: center; align-items: center;
  font-size: 24px; font-weight: 700; color: #FFFFFF; flex-shrink: 0;
}
.profile-info { display: flex; flex-direction: column; gap: 4px; flex: 1; min-width: 0; }
.profile-name { font-size: 20px; font-weight: 700; color: var(--title); line-height: 24px; }
.profile-dept { font-size: 13px; font-weight: 400; color: var(--body); line-height: 16px; }
.profile-team { font-size: 12px; font-weight: 400; color: var(--meta-alt); line-height: 14px; }
.contact-row { display: flex; gap: 24px; width: 310px; }
.contact-item { display: flex; gap: 6px; align-items: center; flex: 1; min-width: 0; }
.contact-item svg { width: 14px; height: 14px; flex-shrink: 0; }
.contact-item span { font-size: 12px; font-weight: 400; color: var(--body); line-height: 15px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

/* ===== MENU ===== */
.menu-card {
  background: var(--card); padding: 4px; gap: 0;
  display: flex; flex-direction: column;
  width: 358px; flex-shrink: 0;
}
.menu-item {
  display: flex; gap: 12px; align-items: center;
  padding: 14px; cursor: pointer;
  transition: background 0.15s; width: 350px;
}
.menu-item:hover { background: var(--primary-light); }
.menu-item svg.menu-icon { width: 20px; height: 20px; flex-shrink: 0; }
.menu-label {
  font-size: 15px; font-weight: 500; color: var(--title);
  line-height: 18px; flex: 1; min-width: 0;
}
.menu-divider { width: 318px; height: 1px; background: #F1F5F9; align-self: center; }
.menu-badge {
  display: inline-flex; justify-content: center; align-items: center;
  padding: 4px 10px; border-radius: 12px;
  font-size: 12px; font-weight: 600; line-height: 14px; flex-shrink: 0;
}
.menu-badge.primary { background: var(--primary-light); color: var(--primary); }
.menu-badge.green { background: var(--green-bg); color: var(--green); }
.menu-badge.red { background: var(--red-bg); color: var(--red); }
.menu-arrow { width: 16px; height: 16px; flex-shrink: 0; }
.menu-arrow svg { width: 16px; height: 16px; }

.logout-btn {
  background: var(--card); padding: 14px;
  display: flex; justify-content: center; align-items: center;
  width: 358px; flex-shrink: 0;
  border-radius: 12px; border: 1px solid #FEE2E2;
  cursor: pointer; transition: background 0.15s;
}
.logout-btn:hover { background: #FEF2F2; }
.logout-btn span { font-size: 15px; font-weight: 500; color: var(--red); line-height: 18px; }

/* ============================ */
/*  LOGIN SCREEN                */
/* ============================ */
#loginScreen {
  position: absolute; top: 0; left: 0;
  width: 390px; height: 844px;
  background: var(--bg);
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  z-index: 100;
  opacity: 1; pointer-events: auto;
  transition: opacity 0.4s ease, pointer-events 0s 0.4s;
}
#loginScreen.hidden { opacity: 0; pointer-events: none; }

.login-logo {
  width: 72px; height: 72px; border-radius: 20px;
  background: var(--primary);
  display: flex; align-items: center; justify-content: center;
  font-size: 32px; font-weight: 800; color: #fff;
  margin-bottom: 16px;
}
.login-title { font-size: 26px; font-weight: 700; color: var(--title); margin-bottom: 6px; }
.login-subtitle { font-size: 14px; color: var(--body); margin-bottom: 36px; }

.login-form { width: 310px; display: flex; flex-direction: column; gap: 16px; }
.login-field { display: flex; flex-direction: column; gap: 6px; }
.login-field label { font-size: 13px; font-weight: 600; color: var(--title); }
.login-field input {
  width: 100%; height: 48px; padding: 0 16px;
  border: 1.5px solid var(--border); border-radius: 12px;
  background: var(--card); font-size: 15px; color: var(--title);
  outline: none; font-family: inherit;
  transition: border-color 0.2s;
}
.login-field input:focus { border-color: var(--primary); }
.login-field input::placeholder { color: var(--meta); }
.login-error { font-size: 12px; color: var(--red); min-height: 16px; line-height: 16px; }
.login-submit {
  width: 100%; height: 48px;
  background: var(--primary); color: #fff;
  border: none; border-radius: 12px;
  font-size: 16px; font-weight: 600;
  cursor: pointer; font-family: inherit;
  transition: background 0.15s;
  margin-top: 8px;
}
.login-submit:hover { background: var(--primary-hover); }
.login-hint {
  font-size: 12px; color: var(--meta-alt); text-align: center;
  margin-top: 16px; line-height: 20px;
}

/* ---- Login Tabs ---- */
.login-tabs {
  display: flex; width: 310px; margin-bottom: 28px;
  border-bottom: 2px solid #EEF2FF;
}
.login-tab {
  flex: 1; text-align: center; padding: 10px 0 12px;
  font-size: 15px; font-weight: 600; cursor: pointer;
  color: var(--meta-alt); border: none; background: none;
  font-family: inherit; position: relative;
  transition: color 0.2s;
}
.login-tab.active { color: var(--title); }
.login-tab.active::after {
  content: ''; position: absolute; bottom: -2px; left: 20%; width: 60%; height: 2.5px;
  border-radius: 2px; transition: background 0.2s;
}
.login-tab.active.pw::after { background: var(--primary); }
.login-tab.active.wx::after { background: #07C160; }

/* ---- WeChat Login ---- */
.login-panel { display: none; width: 310px; flex-direction: column; gap: 16px; }
.login-panel.active { display: flex; }

.wechat-phone-row {
  display: flex; gap: 0; align-items: stretch;
  border: 1.5px solid #E2E8F0; border-radius: 12px; overflow: hidden;
  background: var(--card); transition: border-color 0.2s;
}
.wechat-phone-row:focus-within { border-color: #07C160; }
.wechat-area-code {
  display: flex; align-items: center; padding: 0 12px;
  font-size: 15px; font-weight: 600; color: var(--title);
  background: #F8FAFC; border-right: 1px solid #E2E8F0; white-space: nowrap;
  gap: 4px; cursor: default;
}
.wechat-area-code svg { width: 12px; height: 12px; color: var(--meta-alt); }
.wechat-phone-row input {
  flex: 1; height: 48px; padding: 0 14px; border: none; outline: none;
  font-size: 15px; color: var(--title); background: transparent;
  font-family: inherit;
}
.wechat-phone-row input::placeholder { color: var(--meta); }

.wechat-code-row {
  display: flex; gap: 10px;
}
.wechat-code-input {
  flex: 1; height: 48px; padding: 0 14px;
  border: 1.5px solid #E2E8F0; border-radius: 12px;
  font-size: 15px; color: var(--title); outline: none;
  font-family: inherit; background: var(--card);
  transition: border-color 0.2s;
}
.wechat-code-input:focus { border-color: #07C160; }
.wechat-code-input::placeholder { color: var(--meta); }
.wechat-send-code {
  width: 120px; height: 48px; flex-shrink: 0;
  border-radius: 12px; border: none;
  font-size: 13px; font-weight: 600; cursor: pointer;
  font-family: inherit; color: #fff; background: #07C160;
  transition: all 0.15s;
}
.wechat-send-code:hover:not(:disabled) { background: #06AD56; }
.wechat-send-code:disabled { background: #A7F0C9; cursor: not-allowed; }

.wechat-login-btn {
  width: 100%; height: 48px; border-radius: 12px;
  border: none; font-size: 16px; font-weight: 600;
  cursor: pointer; font-family: inherit;
  background: #07C160; color: #fff;
  transition: background 0.15s; margin-top: 4px;
}
.wechat-login-btn:hover { background: #06AD56; }

.wechat-divider {
  display: flex; align-items: center; gap: 12px;
  width: 310px; margin-top: 20px;
}
.wechat-divider::before, .wechat-divider::after {
  content: ''; flex: 1; height: 1px; background: #E2E8F0;
}
.wechat-divider span {
  font-size: 11px; color: var(--meta-alt); white-space: nowrap;
}

.wechat-platform-icons {
  display: flex; justify-content: center; gap: 24px;
  width: 310px; margin-top: 16px;
}
.wechat-icon-btn {
  width: 44px; height: 44px; border-radius: 50%;
  border: 1px solid #E2E8F0; background: #fff;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; transition: all 0.2s;
}
.wechat-icon-btn:hover { border-color: #07C160; box-shadow: 0 0 0 3px rgba(7,193,96,0.1); }
.wechat-icon-btn svg { width: 22px; height: 22px; }

.wechat-login-hint {
  font-size: 11px; color: var(--meta-alt); text-align: center;
  line-height: 18px; width: 310px; margin-top: 8px;
}
.wechat-login-hint a {
  color: #07C160; text-decoration: none;
}
.wechat-login-hint a:hover { text-decoration: underline; }

/* ---- WeChat Badge in Profile ---- */
.wechat-badge {
  display: inline-flex; align-items: center; gap: 3px;
  padding: 2px 8px; border-radius: 8px;
  background: #E8F8EE; color: #07C160;
  font-size: 10px; font-weight: 600;
  margin-left: 6px; vertical-align: middle;
}
.wechat-badge svg { width: 10px; height: 10px; }

/* ---- Register Panel ---- */
.register-link-row {
  width: 310px; text-align: center; margin-top: 20px;
}
.register-link {
  font-size: 13px; color: var(--primary); cursor: pointer;
  background: none; border: none; font-family: inherit;
  font-weight: 500;
}
.register-link:hover { text-decoration: underline; }

.register-back {
  font-size: 13px; color: var(--meta-alt); cursor: pointer;
  background: none; border: none; font-family: inherit;
  display: flex; align-items: center; gap: 4px;
  margin-bottom: 20px; align-self: flex-start;
}
.register-back:hover { color: var(--primary); }
.register-back svg { width: 14px; height: 14px; }

/* ---- SMS Notification Banner ---- */
.sms-banner {
  width: 310px; padding: 12px 14px; border-radius: 12px;
  background: #1B1C1E; color: #fff;
  font-size: 12px; line-height: 18px;
  display: flex; gap: 10px; align-items: flex-start;
  opacity: 0; transform: translateY(-8px);
  transition: all 0.35s ease;
  pointer-events: none; margin-bottom: 16px;
}
.sms-banner.show { opacity: 1; transform: translateY(0); pointer-events: auto; }
.sms-banner .sms-icon {
  width: 32px; height: 32px; border-radius: 8px;
  background: #34C759; flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
}
.sms-banner .sms-icon svg { width: 16px; height: 16px; color: #fff; }
.sms-banner .sms-content { flex: 1; }
.sms-banner .sms-sender {
  font-size: 11px; color: #A0A0A5; margin-bottom: 2px;
}
.sms-banner .sms-body { font-size: 13px; line-height: 20px; }
.sms-banner .sms-body .sms-code {
  font-size: 22px; font-weight: 700; letter-spacing: 4px;
  color: #34C759; display: inline; margin: 0 4px;
}
.sms-banner .sms-time {
  font-size: 10px; color: #636366; margin-top: 4px;
}

.register-step {
  font-size: 13px; font-weight: 600; color: var(--meta-alt);
  text-align: center; margin-bottom: 4px;
}
.register-step .step-num {
  display: inline-flex; align-items: center; justify-content: center;
  width: 20px; height: 20px; border-radius: 50%;
  background: var(--primary-light); color: var(--primary);
  font-size: 11px; margin-right: 6px; vertical-align: middle;
}
.register-step .step-num.done {
  background: var(--green); color: #fff;
}

/* ============================ */
/*  MODAL SYSTEM                */
/* ============================ */
.modal-overlay {
  position: absolute; top: 0; left: 0;
  width: 390px; height: 844px;
  background: rgba(15,15,30,0.5);
  display: flex; align-items: flex-end; justify-content: center;
  z-index: 200;
  opacity: 0; pointer-events: none;
  transition: opacity 0.25s ease;
}
.modal-overlay.show { opacity: 1; pointer-events: auto; }
.modal-sheet {
  width: 390px; max-height: 580px;
  background: #fff;
  border-radius: 24px 24px 0 0;
  display: flex; flex-direction: column;
  overflow: hidden;
  transform: translateY(100%);
  transition: transform 0.3s cubic-bezier(0.32, 0.72, 0, 1);
}
.modal-overlay.show .modal-sheet { transform: translateY(0); }
.modal-handle {
  width: 36px; height: 4px; background: #E2E8F0;
  border-radius: 2px; align-self: center;
  margin: 12px 0 8px 0; flex-shrink: 0;
}
.modal-title {
  font-size: 18px; font-weight: 700; color: var(--title);
  padding: 0 24px 16px; flex-shrink: 0;
}
.modal-body {
  flex: 1; overflow-y: auto; padding: 0 24px 24px;
  display: flex; flex-direction: column; gap: 14px;
}
.modal-field { display: flex; flex-direction: column; gap: 4px; }
.modal-field label { font-size: 12px; font-weight: 600; color: var(--meta-alt); text-transform: uppercase; letter-spacing: 0.5px; }
.modal-field input, .modal-field select, .modal-field textarea {
  width: 100%; padding: 10px 14px;
  border: 1.5px solid #E2E8F0; border-radius: 10px;
  font-size: 14px; color: var(--title);
  outline: none; font-family: inherit;
  transition: border-color 0.2s;
  background: #FAFBFC;
}
.modal-field input:focus, .modal-field textarea:focus, .modal-field select:focus { border-color: var(--primary); background: #fff; }
.modal-field textarea { min-height: 80px; resize: vertical; }
.modal-field .hint { font-size: 11px; color: var(--meta); }

.modal-footer {
  display: flex; gap: 10px; padding: 16px 24px 28px;
  border-top: 1px solid #F1F5F9; flex-shrink: 0;
}
.modal-btn {
  flex: 1; height: 44px; border-radius: 12px;
  font-size: 15px; font-weight: 600;
  border: none; cursor: pointer; font-family: inherit;
  transition: background 0.15s;
}
.modal-btn.cancel { background: #F1F5F9; color: var(--body); }

.modal-btn.confirm { background: var(--primary); color: #fff; }

.modal-btn.danger { background: var(--red); color: #fff; flex: 0.5; }
.modal-btn.danger:hover { background: var(--red-hover); }

/* ===== TOAST ===== */
.toast {
  position: absolute; top: 60px; left: 50%; transform: translateX(-50%);
  padding: 10px 22px; border-radius: 20px;
  font-size: 13px; font-weight: 600; color: #fff;

  opacity: 0; pointer-events: none;
  transition: opacity 0.3s;
}

/* ===== PRIORITY SELECT ===== */
.priority-row {

}

<script>
// ╔══════════════════════════════════════════════════════════════╗
// ║                   🔐 认证系统                                ║
// ╚══════════════════════════════════════════════════════════════╝

const AUTH_KEY = 'tc_auth';
const DATA_KEY = 'tc_data';

function getAuth() {
  try { return JSON.parse(localStorage.getItem(AUTH_KEY)); } catch(e) { return null; }
}
function setAuth(user) { localStorage.setItem(AUTH_KEY, JSON.stringify(user)); }
function clearAuth() { localStorage.removeItem(AUTH_KEY); }

// ╔══════════════════════════════════════════════════════════════╗
// ║               🔐 登录方式切换 / 微信登录                      ║
// ╚══════════════════════════════════════════════════════════════╝

let loginTabIdx = 0;

function switchLoginTab(idx) {
  loginTabIdx = idx;
  document.querySelectorAll('.login-tab').forEach((t, i) => t.classList.toggle('active', i === idx));
  document.getElementById('loginPanelPassword').classList.toggle('active', idx === 0);
  document.getElementById('loginPanelWechat').classList.toggle('active', idx === 1);
  document.getElementById('loginPanelRegister').classList.remove('active');
  document.getElementById('registerEntry').style.display = '';
  document.getElementById('loginError').textContent = '';
  document.getElementById('wechatError').textContent = '';
  // 更新底部提示
  document.getElementById('loginHintBottom').textContent =
    idx === 0 ? '默认管理员账号: admin / admin123' : '短信验证码将发送至手机';
  // 隐藏短信通知条
  document.getElementById('smsBanner').classList.remove('show');
  // 聚焦对应输入框
  setTimeout(() => {
    if (idx === 0) document.getElementById('loginUser').focus();
    else document.getElementById('wechatPhone').focus();
  }, 100);
}

// ---- 验证码系统 ----
// 运营商模拟: 微信登录和手机注册分别管理验证码
let wechatVerifyCode = '';  // 微信登录的验证码
let regVerifyCode = '';     // 手机注册的验证码
let countdownTimer = null;
let countdown = 0;

function generateVerifyCode() {
  // 生成随机6位数字验证码
  return String(Math.floor(100000 + Math.random() * 900000));
}

function showSmsBanner(phone, code) {
  const banner = document.getElementById('smsBanner');
  const masked = phone.slice(0, 3) + '****' + phone.slice(7);
  document.getElementById('smsSender').textContent = '中国移动';
  document.getElementById('smsBody').innerHTML =
    '【TeamConnect】您的验证码为 <span class="sms-code">' + code + '</span>，有效期5分钟，请勿泄露给他人。';
  document.getElementById('smsTime').textContent = '刚刚 · 发送至 ' + masked;
  banner.classList.add('show');
  // 8秒后自动隐藏
  clearTimeout(banner._hideTimer);
  banner._hideTimer = setTimeout(() => banner.classList.remove('show'), 8000);
}

function sendVerifyCode() {
  const phone = document.getElementById('wechatPhone').value.trim();
  const errEl = document.getElementById('wechatError');
  if (!phone || !/^1\d{10}$/.test(phone)) {
    errEl.textContent = '请输入正确的11位手机号';
    return;
  }
  if (countdown > 0) return;
  errEl.textContent = '';

  // 生成随机验证码
  wechatVerifyCode = generateVerifyCode();

  // 显示模拟短信通知
  showSmsBanner(phone, wechatVerifyCode);

  // 倒计时
  countdown = 60;
  const btn = document.getElementById('wechatSendBtn');
  btn.disabled = true;
  btn.textContent = countdown + 's';
  countdownTimer = setInterval(() => {
    countdown--;
    if (countdown <= 0) {
      clearInterval(countdownTimer);
      btn.disabled = false;
      btn.textContent = '重新获取';
    } else {
      btn.textContent = countdown + 's';
    }
  }, 1000);
  showToast('短信验证码已发送');
}

// ---- 微信登录 ----
function doWechatLogin() {
  const phone = document.getElementById('wechatPhone').value.trim();
  const code = document.getElementById('wechatCode').value.trim();
  const errEl = document.getElementById('wechatError');

  if (!phone || !/^1\d{10}$/.test(phone)) { errEl.textContent = '请输入正确的手机号'; return; }
  if (!code) { errEl.textContent = '请输入验证码'; return; }
  if (code !== wechatVerifyCode || !wechatVerifyCode) { errEl.textContent = '验证码错误，请重新获取'; return; }

  errEl.textContent = '';

  // 优先检查注册用户
  const users = loadUsers();
  let wxNickname;
  if (users[phone]) {
    wxNickname = users[phone].nickname;
  } else if (phone === '13800000000') {
    wxNickname = '张明远';
  } else {
    wxNickname = '微信用户';
  }

  setAuth({
    username: phone,
    nickname: wxNickname,
    loginType: 'wechat',
    phone: phone,
    loginAt: Date.now()
  });

  document.getElementById('loginScreen').classList.add('hidden');
  const existingData = loadData();
  // 同步个人资料
  if (users[phone]) {
    existingData.profile.name = existingData.profile.name || users[phone].nickname;
    existingData.profile.phone = existingData.profile.phone || phone;
    existingData.profile.avatar = existingData.profile.avatar || users[phone].nickname.charAt(0);
  } else if (phone === '13800000000' && existingData.profile) {
    existingData.profile.phone = phone;
  }
  DATA = existingData;
  renderAll();
  showToast('微信登录成功');

  // 清理倒计时
  if (countdownTimer) { clearInterval(countdownTimer); countdown = 0; }
}

// ╔══════════════════════════════════════════════════════════════╗
// ║               📝 手机号注册系统                               ║
// ╚══════════════════════════════════════════════════════════════╝

const USERS_KEY = 'tc_users';

function loadUsers() {
  try { return JSON.parse(localStorage.getItem(USERS_KEY)) || {}; } catch(e) { return {}; }
}
function saveUsers(users) {
  localStorage.setItem(USERS_KEY, JSON.stringify(users));
}

let regCountdownTimer = null;
let regCountdown = 0;

// 显示/隐藏注册面板
function showRegisterPanel() {
  document.getElementById('loginPanelPassword').classList.remove('active');
  document.getElementById('loginPanelWechat').classList.remove('active');
  document.getElementById('loginPanelRegister').classList.add('active');
  document.getElementById('registerEntry').style.display = 'none';
  document.getElementById('loginHintBottom').textContent = '短信验证码将发送至手机，请留意查收';
  document.querySelectorAll('.login-tab').forEach(t => t.classList.remove('active'));
  // 隐藏短信通知条
  document.getElementById('smsBanner').classList.remove('show');
  // 重置注册表单
  document.getElementById('regStep1').style.display = '';
  document.getElementById('regStep2').style.display = 'none';
  document.getElementById('regPhone').value = '';
  document.getElementById('regCode').value = '';
  document.getElementById('regNickname').value = '';
  document.getElementById('regPass').value = '';
  document.getElementById('regPass2').value = '';
  document.getElementById('regError').textContent = '';
  setTimeout(() => document.getElementById('regPhone').focus(), 100);
}

function showLoginPanels() {
  document.getElementById('loginPanelRegister').classList.remove('active');
  document.getElementById('registerEntry').style.display = '';
  document.getElementById('smsBanner').classList.remove('show');
  switchLoginTab(0);
}

// 注册-发送验证码
function regSendCode() {
  const phone = document.getElementById('regPhone').value.trim();
  const errEl = document.getElementById('regError');
  if (!phone || !/^1\d{10}$/.test(phone)) {
    errEl.textContent = '请输入正确的11位手机号';
    return;
  }
  // 检查是否已注册
  const users = loadUsers();
  if (users[phone]) {
    errEl.textContent = '该手机号已注册，请直接登录';
    return;
  }
  if (regCountdown > 0) return;
  errEl.textContent = '';

  // 生成随机验证码
  regVerifyCode = generateVerifyCode();

  // 显示模拟短信通知
  showSmsBanner(phone, regVerifyCode);

  // 切换到步骤2
  document.getElementById('regStep1').style.display = 'none';
  document.getElementById('regStep2').style.display = '';

  // 模拟发送验证码
  regCountdown = 60;
  const btn = document.getElementById('regSendBtn');
  btn.disabled = true;
  btn.textContent = regCountdown + 's';
  regCountdownTimer = setInterval(() => {
    regCountdown--;
    if (regCountdown <= 0) {
      clearInterval(regCountdownTimer);
      btn.disabled = false;
      btn.textContent = '重新获取';
    } else {
      btn.textContent = regCountdown + 's';
    }
  }, 1000);
  showToast('短信验证码已发送');

function doRegister() {
  const phone = document.getElementById('regPhone').value.trim();
  const code = document.getElementById('regCode').value.trim();
  const nickname = document.getElementById('regNickname').value.trim();
  const pass = document.getElementById('regPass').value.trim();
  const pass2 = document.getElementById('regPass2').value.trim();
  const errEl = document.getElementById('regError');

  if (!code) { errEl.textContent = '请输入验证码'; return; }
  if (code !== regVerifyCode || !regVerifyCode) { errEl.textContent = '验证码错误，请重新获取'; return; }
  if (!nickname) { errEl.textContent = '请输入昵称'; return; }
  if (!pass || pass.length < 6) { errEl.textContent = '密码至少6位'; return; }
  if (pass !== pass2) { errEl.textContent = '两次密码不一致'; return; }

  // 保存用户
  const users = loadUsers();
  users[phone] = {
    phone: phone,
    nickname: nickname,
    password: pass,
    registeredAt: Date.now()
  };
  saveUsers(users);

  // 自动登录
  setAuth({
    username: phone,
    nickname: nickname,
    loginType: 'registered',
    phone: phone,
    loginAt: Date.now()
  });

  document.getElementById('loginScreen').classList.add('hidden');
  // 为新用户初始化个人资料
  const existingData = loadData();
  existingData.profile = {
    avatar: nickname.charAt(0),
    name: nickname,
    dept: '',
    team: '',
    email: '',
    phone: phone
  };
  DATA = existingData;
  saveData(DATA);
  renderAll();
  showToast('注册成功，欢迎加入！');

  // 清理倒计时
  if (regCountdownTimer) { clearInterval(regCountdownTimer); regCountdown = 0; }
}

function loadData() {
  try {
    const stored = JSON.parse(localStorage.getItem(DATA_KEY));
    // 深度合并默认值，确保新字段不会缺失
    return deepMerge(DEFAULT_DATA, stored || {});
  } catch(e) { return JSON.parse(JSON.stringify(DEFAULT_DATA)); }
}
function saveData(data) {
  localStorage.setItem(DATA_KEY, JSON.stringify(data));
}
function deepMerge(def, stored) {
  const result = JSON.parse(JSON.stringify(def));
  for (const key of Object.keys(stored)) {
    if (stored[key] && typeof stored[key] === 'object' && !Array.isArray(stored[key])) {
      result[key] = deepMerge(def[key] || {}, stored[key]);
    } else {
      result[key] = stored[key];
    }
  }
  return result;
}

// 全局数据状态

// 自动保存的 Proxy
const DATA_PROXY = new Proxy(DATA, {
  set(target, prop, value) {
    target[prop] = value;
    saveData(DATA);
    return true;
  }
});

function updateData(path, value) {
  const keys = path.split('.');
  let obj = DATA;
  for (let i = 0; i < keys.length - 1; i++) obj = obj[keys[i]];
  obj[keys[keys.length - 1]] = value;
  saveData(DATA);
}

function saveAndRefresh() {

  renderAll();
}

function doLogin() {
  const user = document.getElementById('loginUser').value.trim();
  const pass = document.getElementById('loginPass').value.trim();
  const errEl = document.getElementById('loginError');

  if (!user || !pass) { errEl.textContent = '请输入用户名和密码'; return; }

  // 管理员账号
  if (user === 'admin' && pass === 'admin123') {
    errEl.textContent = '';
    setAuth({ username: 'admin', nickname: '管理员', loginType: 'password', loginAt: Date.now() });
    document.getElementById('loginScreen').classList.add('hidden');
    DATA = loadData();
    renderAll();
    showToast('登录成功');
    return;
  }

  // 检查注册用户（支持手机号或昵称登录）
  const users = loadUsers();
  let matchedUser = null;
  // 先按手机号精确匹配
  if (users[user] && users[user].password === pass) {
    matchedUser = users[user];
  } else {
    // 再按昵称模糊匹配
    for (const key of Object.keys(users)) {
      if (users[key].nickname === user && users[key].password === pass) {
        matchedUser = users[key];
        break;
      }
    }
  }

  if (matchedUser) {
    errEl.textContent = '';
    setAuth({
      username: matchedUser.phone,
      nickname: matchedUser.nickname,
      loginType: 'registered',
      phone: matchedUser.phone,
      loginAt: Date.now()
    });
    document.getElementById('loginScreen').classList.add('hidden');
    // 同步个人资料
    const existingData = loadData();
    existingData.profile.name = existingData.profile.name || matchedUser.nickname;
    existingData.profile.phone = existingData.profile.phone || matchedUser.phone;
    existingData.profile.avatar = existingData.profile.avatar || matchedUser.nickname.charAt(0);
    DATA = existingData;
    renderAll();
    showToast('登录成功，欢迎回来');
    return;
  }

  errEl.textContent = '用户名或密码错误';
}

function doLogout() {
  if (confirm('确定要退出登录吗？')) {
    clearAuth();
    document.getElementById('loginScreen').classList.remove('hidden');
    // 重置为密码登录Tab
    switchLoginTab(0);
  }
}

let modalCallback = null;

function showModal(title, bodyHTML, footerHTML, cb) {
  document.getElementById('modalTitle').textContent = title;
  document.getElementById('modalBody').innerHTML = bodyHTML;
  document.getElementById('modalFooter').innerHTML = footerHTML;
  modalCallback = cb;
  document.getElementById('modalOverlay').classList.add('show');
}

function closeModal() {
  document.getElementById('modalOverlay').classList.remove('show');
  modalCallback = null;
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2000);
}

// ---------- 工具函数 ----------
function escapeHtml(str) {
  if (!str) return '';
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function switchTo(tabIdx) {
  switchTab(tabIdx);
  setTimeout(() => { document.getElementById('screen' + (tabIdx + 1)).classList.add('active'); }, 50);
}

// ===== RESPONSIVE SCALING =====
function updateScale() {
  const container = document.getElementById('scaleContainer');
  const scale = Math.min(window.innerWidth / 390, window.innerHeight / 844);
  const offsetX = (window.innerWidth - 390 * scale) / 2;
  const offsetY = (window.innerHeight - 844 * scale) / 2;
  container.style.transform = `scale(${scale})`;
  container.style.left = offsetX + 'px';
  container.style.top = offsetY + 'px';
}
window.addEventListener('resize', updateScale);
updateScale();

// ===== TAB SWITCHING =====
let currentTab = 0;

function switchTab(index) {
  if (currentTab === index) return;
  currentTab = index;

  document.querySelectorAll('#appWrapper .screen').forEach(s => s.classList.remove('active'));
  const screens = document.querySelectorAll('#appWrapper .screen');
  if (screens[index]) screens[index].classList.add('active');

  document.querySelectorAll('.tab-pill').forEach(pill => {
    pill.querySelectorAll('.tab-item').forEach((item, i) => {
      item.classList.toggle('active', i === index);
    });
  });

  const scrollEls = ['scroll1', 'scroll2', 'scroll3', 'scroll4'];
  if (scrollEls[index]) {
    const el = document.getElementById(scrollEls[index]);
    if (el) el.scrollTop = 0;
  }
}

// ===== KEYBOARD =====
document.addEventListener('keydown', e => {
  if (!document.getElementById('modalOverlay').classList.contains('show') && document.getElementById('loginScreen').classList.contains('hidden')) {
    const tabs = [0, 1, 2, 3];
    let idx = currentTab;
    if (e.key === 'ArrowRight' || e.key === 'ArrowDown') idx = (idx + 1) % tabs.length;
    else if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') idx = (idx - 1 + tabs.length) % tabs.length;
    else return;
    switchTab(tabs[idx]);
  }
});

// ===== TOUCH SWIPE =====
let touchStartX = 0;
document.addEventListener('touchstart', e => { touchStartX = e.touches[0].clientX; });
document.addEventListener('touchend', e => {
  if (document.getElementById('modalOverlay').classList.contains('show')) return;
  const diff = e.changedTouches[0].clientX - touchStartX;
  if (Math.abs(diff) < 50) return;
  const tabs = [0, 1, 2, 3];
  let idx = currentTab;
  if (diff < 0) idx = (idx + 1) % tabs.length;
  else idx = (idx - 1 + tabs.length) % tabs.length;
  switchTab(tabs[idx]);
});
